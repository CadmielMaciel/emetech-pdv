<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Termos de Uso — MISU SYS</title>
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;background:#070B1A;color:#E8ECF4;line-height:1.7;padding:0}
  .top{background:linear-gradient(135deg,#1E5EFF,#0A2FA8);padding:28px 20px;text-align:center}
  .top h1{font-size:22px;font-weight:800;color:#fff;display:flex;align-items:center;justify-content:center;gap:10px}
  .top .sub{color:rgba(255,255,255,.8);font-size:13px;margin-top:6px}
  .wrap{max-width:760px;margin:0 auto;padding:32px 22px}
  .card{background:#0F1629;border:1px solid #1E2740;border-radius:14px;padding:26px;white-space:pre-wrap;font-size:14.5px}
  .meta{font-size:12px;color:#8A93A8;margin-top:18px;text-align:center}
  .loading{text-align:center;padding:40px;color:#8A93A8}
  a{color:#3D8BFF}
</style>
</head>
<body>
  <div class="top">
    <h1><i class="ti ti-file-certificate"></i> <span id="titulo">Termos de Uso</span></h1>
    <div class="sub">MISU SYS — Sistema de Gestão</div>
  </div>
  <div class="wrap">
    <div class="card" id="conteudo"><div class="loading"><i class="ti ti-loader-2" style="font-size:28px"></i><br>Carregando termos…</div></div>
    <div class="meta" id="meta"></div>
  </div>
<script>
  const SURL='https://icgfpfwcnhkjglrmnuca.supabase.co';
  const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImljZ2ZwZndjbmhramdscm1udWNhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwODA2OTEsImV4cCI6MjA5NTY1NjY5MX0.xDGiGCIlqXaqdWhWo0NoNi_XUdlw5raCogO_Jnc0ezw';
  const db=supabase.createClient(SURL,SKEY);
  (async()=>{
    try{
      const {data,error}=await db.rpc('termos_vigente');
      if(error||!data){ throw error||new Error('sem dados'); }
      document.getElementById('titulo').textContent=data.titulo||'Termos de Uso';
      document.getElementById('conteudo').textContent=data.conteudo||'';
      document.getElementById('meta').textContent='Versão '+data.versao;
    }catch(e){
      document.getElementById('conteudo').innerHTML='<div class="loading">Não foi possível carregar os termos no momento.</div>';
    }
  })();
</script>
</body>
</html>
