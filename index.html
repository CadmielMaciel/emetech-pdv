<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMETech — ERP PDV v4.0</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --pri:#5B47E0;--pri2:#7C3AED;--pri-light:#EDE9FF;--pri-dark:#2D1B8E;
  --bg:#F4F2FB;--bg2:#fff;--surface:#FAFAFE;--surface2:#F0EDF8;
  --txt:#1A0F3C;--txt2:#5C4F8A;--txt3:#9D8FC5;--txt4:#C4B8E8;
  --border:#E4DEFF;--border2:#D4CAFF;
  --success:#10B981;--danger:#EF4444;--warn:#F59E0B;--info:#3B82F6;
  --radius:12px;--radius-lg:18px;
  --shadow:0 2px 16px rgba(79,53,194,.10);--shadow-lg:0 8px 32px rgba(79,53,194,.16);
  --sw:230px;--sw-mini:56px;--th:62px;--trans:all .2s cubic-bezier(.4,0,.2,1);
}
[data-theme="dark"]{--bg:#0F0A1E;--bg2:#1A1030;--surface:#201540;--surface2:#2A1D50;--txt:#F0EEFF;--txt2:#B8AADC;--txt3:#7A6FAA;--txt4:#4A4070;--border:#2E2050;--border2:#3A2A6A;--pri-light:#2D1B8E;}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow:hidden;transition:background .3s,color .3s}

/* LOGIN */
.ls{position:fixed;inset:0;background:linear-gradient(135deg,var(--pri-dark),var(--pri) 50%,var(--pri2));display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s}
.ls.hidden{opacity:0;pointer-events:none}
.lb{background:#fff;border-radius:24px;padding:40px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.l-icon{width:60px;height:60px;background:linear-gradient(135deg,var(--pri),var(--pri2));border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;box-shadow:0 8px 24px rgba(91,71,224,.4)}
.l-icon span{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;color:#fff}
.l-title{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:#1A0F3C;text-align:center}
.l-sub{font-size:13px;color:#9D8FC5;text-align:center;margin-top:3px;margin-bottom:24px}
.l-err{background:#FEF2F2;color:#EF4444;border:1px solid #FECACA;border-radius:9px;padding:10px 14px;font-size:13px;font-weight:600;margin-bottom:14px;display:none}
.l-lbl{display:block;font-size:11.5px;font-weight:700;color:#5C4F8A;margin-bottom:5px;text-transform:uppercase;letter-spacing:.6px}
.l-inp{width:100%;padding:11px 14px;border:1.5px solid #E4DEFF;border-radius:10px;font-size:14px;font-family:'DM Sans',sans-serif;color:#1A0F3C;outline:none;margin-bottom:14px;transition:border-color .2s}
.l-inp:focus{border-color:#5B47E0;box-shadow:0 0 0 3px rgba(91,71,224,.12)}
.l-btn{width:100%;padding:13px;background:linear-gradient(135deg,#5B47E0,#7C3AED);color:#fff;border:none;border-radius:11px;font-size:15px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.l-btn:hover{opacity:.92;transform:translateY(-1px)}.l-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* APP */
.app{display:flex;height:100vh;opacity:0;transition:opacity .4s}
.app.visible{opacity:1}
/* empurra o main conforme sidebar expande */
.main{transition:margin-left .28s cubic-bezier(.4,0,.2,1)}
/* ── SIDEBAR RECOLHÍVEL ── */
.sidebar{
  width:var(--sw-mini);
  background:linear-gradient(170deg,var(--pri-dark),var(--pri) 60%,var(--pri2));
  display:flex;flex-direction:column;flex-shrink:0;
  overflow:hidden;position:relative;
  transition:width .28s cubic-bezier(.4,0,.2,1);
  z-index:100;
}
.sidebar:hover{ width:var(--sw); }
.sidebar::before{content:'';position:absolute;top:-80px;right:-80px;width:200px;height:200px;background:rgba(255,255,255,.05);border-radius:50%;pointer-events:none}

/* Logo area */
.logo-area{padding:14px 10px 12px;border-bottom:1px solid rgba(255,255,255,.12);flex-shrink:0;overflow:hidden}
.logo-badge{display:flex;align-items:center;gap:10px;white-space:nowrap}
.logo-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;background:rgba(255,255,255,.15);padding:5px}
.logo-icon img,.logo-icon svg{width:100%;height:100%;object-fit:contain;filter:brightness(0) invert(1)}
.logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;color:#fff;opacity:0;transition:opacity .2s .05s;white-space:nowrap}
.logo-sub{font-size:9px;color:rgba(255,255,255,.5);letter-spacing:1.8px;text-transform:uppercase;opacity:0;transition:opacity .2s .05s}
.sidebar:hover .logo-text,.sidebar:hover .logo-sub{opacity:1}

/* Nav */
.nav{flex:1;padding:10px 8px;overflow-y:auto;overflow-x:hidden}
.nav::-webkit-scrollbar{width:0}
.nav-sec{
  font-size:9px;color:rgba(255,255,255,.3);letter-spacing:1.8px;text-transform:uppercase;
  padding:10px 10px 4px;font-weight:700;
  white-space:nowrap;overflow:hidden;
  opacity:0;transition:opacity .15s;
  height:0;padding:0;margin:0;
}
.sidebar:hover .nav-sec{opacity:1;height:auto;padding:10px 10px 4px}
.ni{
  display:flex;align-items:center;gap:9px;
  padding:9px 10px;border-radius:9px;cursor:pointer;
  color:rgba(255,255,255,.6);font-size:13px;font-weight:500;
  transition:var(--trans);margin-bottom:1px;
  user-select:none;white-space:nowrap;overflow:hidden;
  position:relative;
}
.ni:hover{background:rgba(255,255,255,.1);color:#fff}
.ni.active{background:rgba(255,255,255,.18);color:#fff;font-weight:600}
.ni i{font-size:18px;flex-shrink:0;min-width:18px}
.ni-label{opacity:0;transition:opacity .15s .05s;white-space:nowrap}
.sidebar:hover .ni-label{opacity:1}

/* Tooltip ao minimizar */
.ni-tip{
  position:absolute;left:calc(var(--sw-mini) + 8px);top:50%;transform:translateY(-50%);
  background:rgba(30,16,64,.95);color:#fff;font-size:12px;font-weight:600;
  padding:5px 10px;border-radius:7px;white-space:nowrap;pointer-events:none;
  opacity:0;transition:opacity .15s;z-index:999;
}
.ni:hover .ni-tip{opacity:1}
.sidebar:hover .ni-tip{display:none}

/* Footer */
.sidebar-footer{padding:10px 8px;border-top:1px solid rgba(255,255,255,.1);flex-shrink:0;overflow:hidden}
.user-pill{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:9px;background:rgba(255,255,255,.1);overflow:hidden;white-space:nowrap}
.user-av{width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.user-name{font-size:11.5px;color:#fff;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;opacity:0;transition:opacity .15s .05s}
.user-role{font-size:9px;color:rgba(255,255,255,.5);text-transform:uppercase}
.sidebar:hover .user-name{opacity:1}
.logout-btn{background:none;border:none;color:rgba(255,255,255,.5);cursor:pointer;font-size:16px;padding:3px;border-radius:5px;transition:var(--trans);opacity:0;transition:opacity .15s .05s}
.logout-btn:hover{color:#fff;background:rgba(255,255,255,.15)}
.sidebar:hover .logout-btn{opacity:1}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 18px;height:var(--th);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px}
.topbar-title{font-family:'Syne',sans-serif;font-weight:700;font-size:16px;color:var(--txt);display:flex;align-items:center;gap:10px}
.topbar-right{display:flex;align-items:center;gap:8px}
.tb-btn{width:34px;height:34px;border-radius:8px;border:1.5px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--txt2);font-size:17px;transition:var(--trans)}
.tb-btn:hover{border-color:var(--pri);color:var(--pri);background:var(--pri-light)}
.caixa-pill{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:8px;font-size:12px;font-weight:600}
.caixa-aberto{background:#ECFDF5;color:#059669;border:1.5px solid #A7F3D0}
.caixa-fechado{background:#FEF2F2;color:var(--danger);border:1.5px solid #FECACA}
.content{flex:1;overflow-y:auto;padding:18px}
.page{display:none;animation:fi .2s ease}
.page.active{display:block}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

/* UI COMPONENTS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:var(--trans);font-family:'DM Sans',sans-serif;white-space:nowrap}
.btn-pri{background:linear-gradient(135deg,var(--pri),var(--pri2));color:#fff;box-shadow:0 2px 10px rgba(91,71,224,.3)}
.btn-pri:hover{opacity:.9;transform:translateY(-1px)}
.btn-out{background:transparent;border:1.5px solid var(--border);color:var(--txt2)}
.btn-out:hover{border-color:var(--pri);color:var(--pri);background:var(--pri-light)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-xs{padding:3px 7px;font-size:11px;border-radius:6px}
.btn-danger{background:#FEF2F2;color:var(--danger);border:1.5px solid #FECACA}
.btn-danger:hover{background:#FEE2E2}
.btn-success{background:#ECFDF5;color:var(--success);border:1.5px solid #A7F3D0}
.btn-ghost{background:transparent;border:none;color:var(--txt3);padding:5px 7px;cursor:pointer;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:12px;display:inline-flex;align-items:center;gap:4px;transition:var(--trans)}
.btn-ghost:hover{color:var(--txt);background:var(--surface)}
.btn-warn{background:#FFFBEB;color:#B45309;border:1.5px solid #FDE68A}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;transition:background .3s}
.card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px}
.card-title{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:var(--txt)}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.sc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;position:relative;overflow:hidden;transition:var(--trans)}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--pri),var(--pri2))}
.sc:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.sc-icon{width:40px;height:40px;border-radius:10px;background:var(--pri-light);display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.sc-icon i{font-size:20px;color:var(--pri)}
.sc-val{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;color:var(--txt)}
.sc-lbl{font-size:11.5px;color:var(--txt3);font-weight:500}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.gdash{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:480px}
th{text-align:left;font-size:10.5px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.9px;padding:8px 11px;background:var(--surface);border-bottom:1px solid var(--border)}
td{padding:9px 11px;font-size:13px;border-bottom:1px solid var(--border);color:var(--txt);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface)}
.tag{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:600;white-space:nowrap}
.tag-pur{background:var(--pri-light);color:var(--pri)}
.tag-grn{background:#ECFDF5;color:#059669}
.tag-red{background:#FEF2F2;color:var(--danger)}
.tag-amb{background:#FFFBEB;color:#B45309}
.tag-blu{background:#EFF6FF;color:#1D4ED8}
.tag-gry{background:var(--surface);color:var(--txt3);border:1px solid var(--border)}
.tag-cyn{background:#ECFEFF;color:#0E7490}
.tag-inf{background:linear-gradient(135deg,#EDE9FF,#E0F2FE);color:var(--pri);border:1px solid #C7D2FE}
.fg{margin-bottom:12px}
.lbl{display:block;font-size:11px;font-weight:700;color:var(--txt2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.6px}
input,select,textarea{width:100%;padding:8px 11px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--txt);background:var(--bg2);outline:none;transition:var(--trans)}
input:focus,select:focus,textarea:focus{border-color:var(--pri);box-shadow:0 0 0 3px rgba(91,71,224,.12)}
input::placeholder,textarea::placeholder{color:var(--txt4)}
.ig{position:relative}.ig i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--txt3);font-size:16px;pointer-events:none}.ig input{padding-left:34px}
.modal-overlay{position:fixed;inset:0;background:rgba(15,10,30,.6);display:flex;align-items:center;justify-content:center;z-index:1000;opacity:0;pointer-events:none;transition:opacity .22s;padding:14px}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border-radius:var(--radius-lg);padding:24px;width:100%;max-width:500px;max-height:92vh;overflow-y:auto;transform:translateY(16px) scale(.98);transition:transform .22s;box-shadow:var(--shadow-lg)}
.modal-overlay.open .modal{transform:translateY(0) scale(1)}
.modal.lg{max-width:720px}.modal.xl{max-width:960px}.modal.sm{max-width:380px}
.modal-title{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;color:var(--txt);margin-bottom:16px;display:flex;align-items:center;gap:9px}
.modal-title i{color:var(--pri)}
.modal-footer{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.ms{font-size:10.5px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:1px;padding:10px 0 7px;border-bottom:1px solid var(--border);margin-bottom:10px}
.toggle{position:relative;width:42px;height:22px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.tslider{position:absolute;inset:0;background:var(--border2);border-radius:22px;cursor:pointer;transition:.3s}
.tslider::before{content:'';position:absolute;width:16px;height:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.3s}
.toggle input:checked+.tslider{background:var(--pri)}
.toggle input:checked+.tslider::before{transform:translateX(20px)}
.loading-overlay{position:fixed;inset:0;background:rgba(15,10,30,.7);display:flex;align-items:center;justify-content:center;z-index:5000;opacity:0;pointer-events:none;transition:opacity .2s}
.loading-overlay.show{opacity:1;pointer-events:all}
.spinner{width:46px;height:46px;border:4px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.notif-stack{position:fixed;bottom:22px;right:22px;z-index:3000;display:flex;flex-direction:column;gap:7px;pointer-events:none}
.notif{background:var(--txt);color:#fff;padding:10px 14px;border-radius:10px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:7px;transform:translateX(110px);opacity:0;transition:all .3s;pointer-events:all;min-width:200px;box-shadow:var(--shadow-lg)}
.notif.show{transform:translateX(0);opacity:1}
.notif.success{background:linear-gradient(135deg,#059669,#10B981)}
.notif.error{background:linear-gradient(135deg,#DC2626,#EF4444)}
.notif.warn{background:linear-gradient(135deg,#D97706,#F59E0B)}
.notif.info{background:linear-gradient(135deg,#1D4ED8,#3B82F6)}
.empty-st{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:36px;color:var(--txt3);text-align:center;gap:7px}
.empty-st i{font-size:40px;opacity:.25}
.empty-st h3{font-size:14px;font-weight:600;color:var(--txt2)}
.sec-title{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:var(--txt);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.sec-title i{color:var(--pri);font-size:17px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border)}
.alert-box{display:flex;align-items:center;gap:9px;border-radius:9px;padding:10px 13px;margin-bottom:12px;font-size:13px;font-weight:500}
.alert-warn{background:#FFFBEB;border:1.5px solid #FDE68A;color:#92400E}
.alert-danger{background:#FEF2F2;border:1.5px solid #FECACA;color:#991B1B}
.alert-info{background:#EFF6FF;border:1.5px solid #BFDBFE;color:#1E40AF}
.alert-success{background:#ECFDF5;border:1.5px solid #A7F3D0;color:#065F46}
.prog-bar{width:100%;height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin:5px 0}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--pri),var(--pri2));border-radius:2px;transition:width .5s}
.filter-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.filter-bar input,.filter-bar select{padding:7px 10px;font-size:12.5px;border-radius:8px;width:auto}
.mov-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:5px;font-size:11px;font-weight:700}
.mov-e{background:#ECFDF5;color:#059669}.mov-s{background:#FEF2F2;color:var(--danger)}.mov-a{background:#EFF6FF;color:#1D4ED8}
.foto-full{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9000;display:none;align-items:center;justify-content:center;cursor:pointer}
.foto-full img{max-width:90vw;max-height:90vh;border-radius:10px}
.img-up{border:2px dashed var(--border2);border-radius:9px;padding:14px;text-align:center;cursor:pointer;transition:var(--trans);background:var(--surface)}
.img-up:hover{border-color:var(--pri);background:var(--pri-light)}
.img-thumbs{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px}
.it-wrap{position:relative;display:inline-block}
.it-wrap img{width:64px;height:64px;border-radius:7px;object-fit:cover;border:2px solid var(--border)}
.it-del{position:absolute;top:-5px;right:-5px;width:18px;height:18px;border-radius:50%;background:var(--danger);color:#fff;border:none;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;opacity:0;transition:var(--trans)}
.it-wrap:hover .it-del{opacity:1}

/* PDV */
.pdv-wrap{display:grid;grid-template-columns:1fr 340px;gap:12px;height:calc(100vh - var(--th) - 36px)}
.pdv-left{display:flex;flex-direction:column;gap:10px}
.pdv-tb{display:flex;gap:8px;flex-shrink:0}
.bc-wrap{position:relative;flex:1}.bc-wrap i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--txt3);font-size:16px}.bc-wrap input{padding-left:32px}
.ps-wrap{position:relative;flex:2}.ps-wrap i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--txt3);font-size:16px}.ps-wrap input{padding-left:32px}
.pg{display:grid;grid-template-columns:repeat(auto-fill,minmax(138px,1fr));gap:9px;overflow-y:auto;flex:1;align-content:start}
.pc{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--radius);padding:11px;cursor:pointer;transition:var(--trans);user-select:none;position:relative}
.pc:hover{border-color:var(--pri);box-shadow:0 4px 16px rgba(91,71,224,.14);transform:translateY(-2px)}
.pc.out{opacity:.4;cursor:not-allowed;pointer-events:none}
.pc-img{width:100%;aspect-ratio:1;background:var(--pri-light);border-radius:7px;display:flex;align-items:center;justify-content:center;margin-bottom:8px;overflow:hidden}
.pc-img i{font-size:26px;color:var(--pri)}
.pc-img img{width:100%;height:100%;object-fit:cover}
.pc-name{font-weight:600;font-size:12px;color:var(--txt);margin-bottom:2px;line-height:1.3}
.pc-sku{font-size:10px;color:var(--txt3);margin-bottom:4px}
