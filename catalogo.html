<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--pri:#5B47E0;--pri-2:#7C3AED;--bg:#f5f6fa;--surface:#fff;--txt:#15103a;--txt2:#5a5670;--txt3:#9a96ad;--border:#eceaf3;--radius:16px}
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:'Inter',system-ui,Arial,sans-serif;background:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased}
  .wrap{max-width:1140px;margin:0 auto;padding:0 18px}
  h1,h2,h3{font-family:'Sora',sans-serif}

  /* HERO */
  .hero{position:relative;background:linear-gradient(135deg,var(--pri),var(--pri-2));color:#fff;padding:46px 0 64px;overflow:hidden}
  .hero::after{content:"";position:absolute;right:-80px;top:-80px;width:320px;height:320px;background:rgba(255,255,255,.08);border-radius:50%}
  .hero::before{content:"";position:absolute;left:-60px;bottom:-120px;width:260px;height:260px;background:rgba(255,255,255,.06);border-radius:50%}
  .hero-inner{position:relative;z-index:2;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
  .hero-logo{width:84px;height:84px;border-radius:22px;background:rgba(255,255,255,.16);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;font-family:'Sora';font-weight:800;font-size:32px;flex-shrink:0;border:1px solid rgba(255,255,255,.25)}
  .hero-logo img{width:100%;height:100%;object-fit:cover;border-radius:22px}
  .hero h1{font-size:34px;font-weight:800;line-height:1.05;letter-spacing:-.5px}
  .hero p{font-size:15px;opacity:.92;margin-top:8px;max-width:560px;line-height:1.5}
  .hero-cta{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}
  .btn{border:0;border-radius:12px;padding:13px 22px;font-size:14.5px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:8px;transition:transform .15s,box-shadow .15s,background .15s}
  .btn:active{transform:scale(.97)}
  .btn-wa{background:#25D366;color:#fff;box-shadow:0 8px 20px rgba(37,211,102,.35)}
  .btn-wa:hover{box-shadow:0 10px 26px rgba(37,211,102,.45)}
  .btn-ghost{background:rgba(255,255,255,.16);color:#fff;border:1px solid rgba(255,255,255,.3)}
  .btn-ghost:hover{background:rgba(255,255,255,.26)}

  /* TOOLBAR sticky */
  .toolbar{position:sticky;top:0;z-index:30;background:rgba(245,246,250,.85);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:12px 0;margin-top:-26px;border-radius:20px 20px 0 0}
  .toolbar-inner{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .search{flex:1;min-width:200px;display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:12px 16px;box-shadow:0 2px 10px rgba(0,0,0,.03)}
  .search input{border:0;outline:0;flex:1;font-size:14.5px;font-family:inherit;background:transparent;color:var(--txt)}
  .cats{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0 4px}
  .chip{background:var(--surface);border:1px solid var(--border);border-radius:22px;padding:8px 17px;font-size:13px;cursor:pointer;transition:all .15s;font-weight:600;color:var(--txt2)}
  .chip:hover{border-color:var(--pri)}
  .chip.on{background:var(--pri);color:#fff;border-color:var(--pri);box-shadow:0 6px 16px rgba(91,71,224,.25)}

  /* SECTIONS */
  .sec{padding:6px 0 0}
  .sec-h{display:flex;align-items:center;gap:9px;font-size:19px;font-weight:800;margin:26px 0 14px}
  .sec-h .pill{font-size:11px;font-weight:700;background:var(--pri);color:#fff;padding:3px 10px;border-radius:20px}
  .offers .sec-h{color:#e8590c}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:18px;padding-bottom:18px}

  /* CARD */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column;transition:transform .2s,box-shadow .2s;position:relative}
  .card:hover{transform:translateY(-5px);box-shadow:0 18px 40px rgba(20,16,58,.12)}
  .card.hot{border-color:#ffd9b8}
  .badge{position:absolute;top:10px;left:10px;z-index:2;font-size:11px;font-weight:800;padding:5px 10px;border-radius:9px;color:#fff;display:inline-flex;align-items:center;gap:4px}
  .badge-hot{background:linear-gradient(135deg,#ff7a18,#e8590c);box-shadow:0 4px 12px rgba(232,89,12,.35)}
  .pimg{width:100%;aspect-ratio:1;background:#f1f0f7;display:flex;align-items:center;justify-content:center;color:#cfccdd;font-size:46px;overflow:hidden}
  .pimg img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
  .card:hover .pimg img{transform:scale(1.05)}
  .pbody{padding:14px 15px 15px;display:flex;flex-direction:column;flex:1}
  .pcat{font-size:10.5px;color:var(--txt3);text-transform:uppercase;letter-spacing:.6px;font-weight:700}
  .pnome{font-size:15px;font-weight:600;margin:4px 0 10px;line-height:1.3;flex:1}
  .pprice-row{display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin-bottom:11px}
  .preco{font-family:'Sora';font-weight:800;font-size:21px;color:var(--pri)}
  .consulte{font-size:13px;color:var(--txt2);font-weight:600}
  .indisp{font-size:11px;color:#fff;background:#E8915B;padding:3px 8px;border-radius:7px;font-weight:600}
  .pbtn{margin-top:auto;background:#25D366;color:#fff;border:0;border-radius:11px;padding:11px;font-size:13.5px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;text-decoration:none;transition:filter .15s}
  .pbtn:hover{filter:brightness(.96)}

  .empty{text-align:center;padding:70px 20px;color:var(--txt3)}
  .empty i{font-size:52px;opacity:.4}
  .loading{text-align:center;padding:90px 20px;color:var(--txt3)}
  .spin{width:38px;height:38px;border:3px solid var(--border);border-top-color:var(--pri);border-radius:50%;animation:sp 1s linear infinite;margin:0 auto 14px}
  @keyframes sp{to{transform:rotate(360deg)}}

  /* FAB whatsapp */
  .fab{position:fixed;right:20px;bottom:20px;width:58px;height:58px;border-radius:50%;background:#25D366;color:#fff;display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 10px 28px rgba(37,211,102,.45);text-decoration:none;z-index:50;transition:transform .15s}
  .fab:hover{transform:scale(1.08)}

  footer{text-align:center;padding:30px 20px 40px;font-size:12px;color:var(--txt3)}
  footer b{color:var(--txt2)}

  @media(max-width:600px){
    .hero{padding:36px 0 56px}
    .hero h1{font-size:27px}
    .hero-logo{width:66px;height:66px;font-size:26px;border-radius:18px}
    .grid{grid-template-columns:repeat(auto-fill,minmax(156px,1fr));gap:13px}
    .preco{font-size:18px}
  }
  .card{cursor:pointer}
  /* MODAL DE PRODUTO */
  .pm-overlay{position:fixed;inset:0;background:rgba(20,16,40,.55);backdrop-filter:blur(4px);display:none;align-items:flex-end;justify-content:center;z-index:200;padding:0}
  .pm-overlay.on{display:flex}
  @media(min-width:640px){.pm-overlay{align-items:center;padding:20px}}
  .pm-card{background:var(--surface);width:100%;max-width:460px;max-height:92vh;overflow-y:auto;border-radius:22px 22px 0 0;position:relative;animation:pmUp .28s cubic-bezier(.2,.8,.2,1)}
  @media(min-width:640px){.pm-card{border-radius:22px}}
  @keyframes pmUp{from{transform:translateY(40px);opacity:.4}to{transform:translateY(0);opacity:1}}
  .pm-close{position:absolute;top:12px;right:12px;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.9);border:1px solid var(--border);color:var(--txt);font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:3}
  .pm-img{height:260px;background:linear-gradient(135deg,#f3f1fa,#eceaf7);display:flex;align-items:center;justify-content:center;font-size:70px;color:var(--txt3)}
  .pm-img img{width:100%;height:100%;object-fit:contain}
  .pm-gal{display:flex;gap:8px;padding:10px 16px 0;overflow-x:auto}
  .pm-gal img{width:54px;height:54px;border-radius:10px;object-fit:cover;border:2px solid transparent;cursor:pointer;flex-shrink:0}
  .pm-gal img.on{border-color:var(--pri)}
  .pm-body{padding:16px 18px 22px}
  .pm-cat{font-size:12px;font-weight:600;color:var(--pri);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
  .pm-nome{font-size:21px;font-weight:800;color:var(--txt);line-height:1.25;margin-bottom:8px}
  .pm-price{font-family:'Sora',sans-serif;font-size:24px;font-weight:800;color:var(--txt);margin-bottom:12px}
  .pm-price .consulte{font-size:15px;font-weight:600;color:var(--txt2)}
  .pm-status{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:700;padding:7px 12px;border-radius:9px;margin-bottom:12px}
  .pm-status.ok{background:rgba(16,185,129,.12);color:#0a9d6e}
  .pm-status.enc{background:rgba(245,158,11,.14);color:#b45309}
  .pm-desc{font-size:14px;color:var(--txt2);line-height:1.6;margin-bottom:14px;white-space:pre-wrap}
  .pm-note{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);border-radius:11px;padding:11px 13px;font-size:12.5px;color:#92500a;line-height:1.5;margin-bottom:14px}
  .pm-wa{display:flex;align-items:center;justify-content:center;gap:8px;background:#25D366;color:#fff;border-radius:13px;padding:14px;font-size:15px;font-weight:700;text-decoration:none;transition:filter .15s}
  .pm-wa:hover{filter:brightness(.95)}
</style>
</head>
<body>
  <div id="app"><div class="loading"><div class="spin"></div>Carregando catálogo...</div></div>
  <div class="pm-overlay" id="modalProduto" onclick="fecharProduto()"></div>

<script>
const SURL='https://icgfpfwcnhkjglrmnuca.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImljZ2ZwZndjbmhramdscm1udWNhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwODA2OTEsImV4cCI6MjA5NTY1NjY5MX0.xDGiGCIlqXaqdWhWo0NoNi_XUdlw5raCogO_Jnc0ezw';
const db=supabase.createClient(SURL,SKEY);

const params=new URLSearchParams(location.search);
const slug=(params.get('loja')||params.get('slug')||'').trim().toLowerCase();

let PRODUTOS=[], LOJA=null, CAT_ATUAL='', BUSCA='';
const fmt=v=>'R$ '+(Number(v)||0).toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.');
const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function waNum(){ const t=(LOJA&&LOJA.whatsapp)||''; return t?(t.length<=11?'55'+t:t):''; }

async function init(){
  if(!slug){ render(`<div class="empty"><i class="ti ti-link-off"></i><p style="margin-top:10px">Link de catálogo inválido.<br>Use: ...catalogo.html?loja=<b>nome-da-loja</b></p></div>`); return; }
  try{
    const {data,error}=await db.from('catalogo_publico').select('*').eq('loja_slug',slug);
    if(error)throw error;
    if(!data||!data.length){ render(`<div class="empty"><i class="ti ti-shopping-bag-x"></i><p style="margin-top:10px">Catálogo não encontrado ou indisponível.</p></div>`); return; }
    PRODUTOS=data;
    PRODUTOS.forEach((p,i)=>{ p._i=i; });
    LOJA={ nome:data[0].loja_nome||'Loja', descricao:data[0].loja_descricao||'', whatsapp:(data[0].loja_whatsapp||'').replace(/\D/g,''), instagram:data[0].loja_instagram||'', cor:data[0].loja_cor||'#5B47E0', mostrarPreco:data[0].mostrar_preco };
    document.documentElement.style.setProperty('--pri',LOJA.cor);
    document.documentElement.style.setProperty('--pri-2',shade(LOJA.cor,-18));
    document.title=LOJA.nome+' — Catálogo';
    desenhar();
  }catch(e){ render(`<div class="empty"><i class="ti ti-alert-triangle"></i><p style="margin-top:10px">Erro ao carregar o catálogo.</p></div>`); }
}
function shade(hex,p){ try{ let n=parseInt(hex.slice(1),16); let r=(n>>16)+p, g=((n>>8)&255)+p, b=(n&255)+p; r=Math.max(0,Math.min(255,r));g=Math.max(0,Math.min(255,g));b=Math.max(0,Math.min(255,b)); return '#'+((r<<16)|(g<<8)|b).toString(16).padStart(6,'0'); }catch(e){ return hex; } }
function render(html){ document.getElementById('app').innerHTML=html; }

function desenhar(){
  const cats=[...new Set(PRODUTOS.map(p=>p.categoria).filter(Boolean))].sort();
  const num=waNum();
  const insta=LOJA.instagram?(LOJA.instagram.startsWith('http')?LOJA.instagram:'https://instagram.com/'+LOJA.instagram.replace('@','')):'';
  render(`
    <header class="hero">
      <div class="wrap hero-inner">
        <div class="hero-logo">${esc(LOJA.nome.slice(0,2).toUpperCase())}</div>
        <div style="flex:1;min-width:220px">
          <h1>${esc(LOJA.nome)}</h1>
          ${LOJA.descricao?`<p>${esc(LOJA.descricao)}</p>`:`<p>Confira nossos produtos e fale com a gente pelo WhatsApp.</p>`}
          <div class="hero-cta">
            ${num?`<a class="btn btn-wa" target="_blank" href="https://wa.me/${num}?text=${encodeURIComponent('Olá! Vi o catálogo de '+LOJA.nome+' e gostaria de mais informações.')}"><i class="ti ti-brand-whatsapp"></i> Falar no WhatsApp</a>`:''}
            <a class="btn btn-ghost" href="#ofertas"><i class="ti ti-flame"></i> Ver ofertas</a>
            ${insta?`<a class="btn btn-ghost" target="_blank" href="${esc(insta)}"><i class="ti ti-brand-instagram"></i></a>`:''}
          </div>
        </div>
      </div>
    </header>

    <div class="wrap">
      <div class="toolbar">
        <div class="toolbar-inner">
          <div class="search"><i class="ti ti-search" style="color:var(--txt3)"></i><input id="q" placeholder="Buscar produto..." oninput="onBusca(this.value)"></div>
        </div>
      </div>
      <div class="cats" id="cats">
        <span class="chip on" onclick="setCat('',this)">Todos</span>
        ${cats.map(c=>`<span class="chip" onclick="setCat('${esc(c)}',this)">${esc(c)}</span>`).join('')}
      </div>
      <div id="lista"></div>
    </div>

    ${num?`<a class="fab" target="_blank" href="https://wa.me/${num}?text=${encodeURIComponent('Olá! Vi o catálogo de '+LOJA.nome)}" title="Falar no WhatsApp"><i class="ti ti-brand-whatsapp"></i></a>`:''}
    <footer>🛍️ Catálogo de <b>${esc(LOJA.nome)}</b> · feito com MISU TECNOLOGY</footer>
  `);
  renderLista();
}

function onBusca(v){ BUSCA=v.toLowerCase(); renderLista(); }
function setCat(c,el){ CAT_ATUAL=c; document.querySelectorAll('.chip').forEach(ch=>ch.classList.remove('on')); if(el)el.classList.add('on'); renderLista(); }

function cardHtml(p,hot){
  const foto=(p.fotos&&p.fotos.length)?`<img src="${esc(p.fotos[0])}" alt="${esc(p.nome)}" loading="lazy">`:'<i class="ti ti-device-mobile"></i>';
  return `<div class="card ${hot?'hot':''}" onclick="abrirProduto(${p._i})">
    ${hot?'<span class="badge badge-hot"><i class="ti ti-flame" style="font-size:12px"></i> Oferta</span>':''}
    <div class="pimg">${foto}</div>
    <div class="pbody">
      <div class="pcat">${esc(p.categoria||'Produto')}</div>
      <div class="pnome">${esc(p.nome)}</div>
      <div class="pprice-row">
        ${p.preco!=null?`<span class="preco">${fmt(p.preco)}</span>`:'<span class="consulte">Consulte o preço</span>'}
        ${p.disponivel===false?'<span class="indisp">Sob encomenda</span>':''}
      </div>
      <div class="pbtn"><i class="ti ti-eye"></i> Ver detalhes</div>
    </div>
  </div>`;
}

// Mensagem pronta de WhatsApp: em estoque = interesse; sem estoque = pedido sob encomenda
function msgProduto(p){
  const preco = p.preco!=null ? ' ('+fmt(p.preco)+')' : '';
  if(p.disponivel===false){
    return `Olá, ${LOJA.nome}! Gostaria de fazer um *pedido sob encomenda* do produto: ${p.nome}${preco}. Vocês conseguem providenciar? Qual o prazo e a forma de pagamento?`;
  }
  return `Olá, ${LOJA.nome}! Tenho interesse no produto: ${p.nome}${preco}. Ainda está disponível? Como faço para comprar?`;
}
function abrirProduto(i){
  const p=PRODUTOS[i]; if(!p) return;
  const num=waNum();
  const fotos=(p.fotos&&p.fotos.length)?p.fotos:[];
  const fotoMain = fotos.length ? `<img id="pm-main" src="${esc(fotos[0])}" alt="${esc(p.nome)}">` : '<i class="ti ti-device-mobile"></i>';
  const galeria = fotos.length>1 ? `<div class="pm-gal">${fotos.map((f,idx)=>`<img src="${esc(f)}" class="${idx===0?'on':''}" onclick="trocaFoto(this)">`).join('')}</div>` : '';
  const enc = p.disponivel===false;
  const msg = encodeURIComponent(msgProduto(p));
  const m=document.getElementById('modalProduto');
  m.innerHTML = `<div class="pm-card" onclick="event.stopPropagation()">
    <button class="pm-close" onclick="fecharProduto()"><i class="ti ti-x"></i></button>
    <div class="pm-img">${fotoMain}</div>
    ${galeria}
    <div class="pm-body">
      <div class="pm-cat">${esc(p.categoria||'Produto')}${p.marca?(' · '+esc(p.marca)):''}</div>
      <h2 class="pm-nome">${esc(p.nome)}</h2>
      <div class="pm-price">${p.preco!=null?fmt(p.preco):'<span class="consulte">Consulte o preço</span>'}</div>
      <div class="pm-status ${enc?'enc':'ok'}">${enc?'<i class="ti ti-truck-delivery"></i> Sob encomenda':'<i class="ti ti-circle-check"></i> Disponível em estoque'}</div>
      ${p.descricao?`<p class="pm-desc">${esc(p.descricao)}</p>`:''}
      ${enc?'<div class="pm-note"><b>Este item não está em estoque no momento.</b> Você pode solicitá-lo como <b>pedido sob encomenda</b> pelo WhatsApp — a loja confirma o prazo e a forma de pagamento com você.</div>':''}
      ${num?`<a class="pm-wa" target="_blank" href="https://wa.me/${num}?text=${msg}"><i class="ti ti-brand-whatsapp"></i> ${enc?'Solicitar pedido no WhatsApp':'Solicitar no WhatsApp'}</a>`:'<div class="pm-note">A loja ainda não cadastrou um WhatsApp para contato.</div>'}
    </div>
  </div>`;
  m.classList.add('on');
}
function fecharProduto(){ document.getElementById('modalProduto').classList.remove('on'); }
function trocaFoto(el){ const mm=document.getElementById('pm-main'); if(mm)mm.src=el.src; document.querySelectorAll('.pm-gal img').forEach(i=>i.classList.remove('on')); el.classList.add('on'); }

function renderLista(){
  let list=PRODUTOS.slice();
  if(CAT_ATUAL) list=list.filter(p=>p.categoria===CAT_ATUAL);
  if(BUSCA) list=list.filter(p=>(p.nome+' '+(p.categoria||'')+' '+(p.marca||'')).toLowerCase().includes(BUSCA));
  const cont=document.getElementById('lista');
  if(!list.length){ cont.innerHTML=`<div class="empty"><i class="ti ti-search-off"></i><p style="margin-top:10px">Nenhum produto encontrado.</p></div>`; return; }

  const destaques=list.filter(p=>p.destaque);
  const normais=list.filter(p=>!p.destaque);
  let html='';
  if(destaques.length && !CAT_ATUAL && !BUSCA){
    html+=`<div class="sec offers" id="ofertas"><div class="sec-h"><i class="ti ti-flame"></i> Ofertas em destaque <span class="pill">${destaques.length}</span></div><div class="grid">${destaques.map(p=>cardHtml(p,true)).join('')}</div></div>`;
    html+=`<div class="sec"><div class="sec-h"><i class="ti ti-layout-grid" style="color:var(--pri)"></i> Todos os produtos</div><div class="grid">${normais.map(p=>cardHtml(p,false)).join('')}</div></div>`;
  } else {
    html+=`<div class="sec" id="ofertas"><div class="grid">${list.map(p=>cardHtml(p,p.destaque)).join('')}</div></div>`;
  }
  cont.innerHTML=html;
}

document.addEventListener('keydown',e=>{ if(e.key==='Escape') fecharProduto(); });
init();
</script>
</body>
</html>
