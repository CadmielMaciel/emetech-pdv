<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Catálogo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --pri:#5B47E0;--pri2:#4533c8;
  --bg:#f6f5fb;--surface:#fff;
  --txt:#1a1530;--txt2:#4a4468;--txt3:#8b87a8;
  --border:#e8e4f4;
  --radius:14px;--radius-sm:10px;
  --shadow:0 2px 16px rgba(91,71,224,.10);
  --shadow-lg:0 8px 32px rgba(91,71,224,.16);
  --trans:all .18s ease;
}

body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}

/* ── LOADING ── */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px}
.spin{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--pri);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{font-size:14px;color:var(--txt3)}

/* ── ERROR ── */
#error-page{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:12px;padding:24px;text-align:center}
#error-page i{font-size:48px;color:var(--txt3)}
#error-page h2{font-family:'Syne',sans-serif;font-size:20px;color:var(--txt)}
#error-page p{font-size:14px;color:var(--txt3);max-width:360px}

/* ── HEADER ── */
header{
  background:var(--pri);
  padding:0 24px;
  position:sticky;top:0;z-index:100;
  box-shadow:0 2px 16px rgba(91,71,224,.28);
}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:14px;height:64px}
.logo-circle{width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:15px;color:#fff;flex-shrink:0}
.header-info{flex:1;min-width:0}
.header-nome{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-desc{font-size:11px;color:rgba(255,255,255,.65);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-actions{display:flex;gap:8px;flex-shrink:0}
.h-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:99px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;transition:var(--trans);text-decoration:none;white-space:nowrap}
.h-btn-wpp{background:#25D366;color:#fff}
.h-btn-wpp:hover{background:#1fb855;transform:translateY(-1px)}
.h-btn-insta{background:rgba(255,255,255,.18);color:#fff;border:1px solid rgba(255,255,255,.3)}
.h-btn-insta:hover{background:rgba(255,255,255,.28)}
.h-btn i{font-size:16px}

/* ── HERO ── */
.hero{
  background:linear-gradient(135deg,var(--pri) 0%,var(--pri2) 100%);
  padding:48px 24px 56px;
  text-align:center;
  position:relative;
  overflow:hidden;
}
.hero::before{content:'';position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:400px;height:400px;background:rgba(255,255,255,.06);border-radius:50%;pointer-events:none}
.hero-logo{width:72px;height:72px;border-radius:20px;background:rgba(255,255,255,.18);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:24px;color:#fff;margin:0 auto 16px;border:2px solid rgba(255,255,255,.25)}
.hero h1{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(24px,5vw,36px);color:#fff;margin-bottom:8px;position:relative}
.hero-desc{font-size:15px;color:rgba(255,255,255,.75);max-width:480px;margin:0 auto 24px;line-height:1.5;position:relative}
.hero-btns{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;position:relative}

/* ── BUSCA + FILTROS ── */
.sticky-filter{position:sticky;top:64px;z-index:90;background:rgba(246,245,251,.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);padding:12px 24px}
.filter-inner{max-width:1200px;margin:0 auto;display:flex;flex-direction:column;gap:10px}
.search-wrap{position:relative}
.search-wrap i{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:18px;color:var(--txt3);pointer-events:none}
#busca{width:100%;padding:10px 14px 10px 42px;border:1.5px solid var(--border);border-radius:99px;font-size:14px;font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--txt);outline:none;transition:var(--trans)}
#busca:focus{border-color:var(--pri);box-shadow:0 0 0 3px rgba(91,71,224,.1)}
#busca::placeholder{color:var(--txt3)}
.cats-row{display:flex;gap:6px;flex-wrap:nowrap;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.cats-row::-webkit-scrollbar{display:none}
.cat-btn{padding:6px 14px;border-radius:99px;border:1.5px solid var(--border);background:rgba(255,255,255,.72);color:var(--txt2);font-size:12px;font-weight:600;cursor:pointer;transition:var(--trans);white-space:nowrap;font-family:'DM Sans',sans-serif}
.cat-btn.active{background:var(--pri);color:#fff;border-color:var(--pri)}
.cat-btn:hover:not(.active){border-color:var(--pri);color:var(--pri)}

/* ── CONTEÚDO ── */
.content{max-width:1200px;margin:0 auto;padding:28px 24px 80px}

/* Seção label */
.sec-label{display:flex;align-items:center;gap:8px;font-family:'Syne',sans-serif;font-weight:800;font-size:14px;color:var(--txt);margin-bottom:14px}
.sec-label span{display:flex;align-items:center;gap:6px;background:var(--pri);color:#fff;padding:4px 10px;border-radius:99px;font-size:12px}

/* Grid destaques */
.grid-destaques{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin-bottom:32px}

/* Grid normal */
.grid-main{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}

/* Card */
.card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:var(--trans);display:flex;flex-direction:column;position:relative}
.card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:rgba(91,71,224,.2)}
.card-hot{border-color:rgba(91,71,224,.25);box-shadow:0 2px 12px rgba(91,71,224,.1)}
.badge-hot{position:absolute;top:10px;left:10px;background:var(--pri);color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:99px;letter-spacing:.5px;text-transform:uppercase}
.badge-enc{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.5);color:#fff;font-size:10px;font-weight:600;padding:3px 8px;border-radius:99px;backdrop-filter:blur(4px)}
.card-img{width:100%;aspect-ratio:1;object-fit:cover;background:var(--bg);display:block}
.card-no-img{width:100%;aspect-ratio:1;background:linear-gradient(135deg,var(--bg),var(--border));display:flex;align-items:center;justify-content:center}
.card-no-img i{font-size:36px;color:var(--txt3)}
.card-body{padding:12px;flex:1;display:flex;flex-direction:column;gap:4px}
.card-cat{font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.6px}
.card-nome{font-size:13px;font-weight:600;color:var(--txt);line-height:1.35}
.card-preco{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:var(--pri);margin-top:4px}
.card-sob{font-size:11px;color:var(--txt3);margin-top:2px}

/* Vazio */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:64px 24px;text-align:center;gap:12px}
.empty i{font-size:48px;color:var(--border)}
.empty h3{font-family:'Syne',sans-serif;font-size:18px;color:var(--txt2)}
.empty p{font-size:13px;color:var(--txt3)}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(10,8,30,.7);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal-box{background:var(--surface);border-radius:20px;max-width:560px;width:100%;max-height:90vh;overflow-y:auto;position:relative;box-shadow:0 24px 80px rgba(0,0,0,.35);animation:modalIn .22s ease}
@keyframes modalIn{from{opacity:0;transform:translateY(16px) scale(.97)}to{opacity:1;transform:none}}
.modal-close{position:absolute;top:14px;right:14px;width:34px;height:34px;border-radius:50%;border:none;background:var(--bg);color:var(--txt3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:var(--trans);z-index:1}
.modal-close:hover{background:var(--border);color:var(--txt)}
.modal-foto-main{width:100%;aspect-ratio:1;object-fit:cover;border-radius:16px 16px 0 0;display:block;background:var(--bg)}
.modal-no-foto{width:100%;height:200px;background:linear-gradient(135deg,var(--bg),var(--border));display:flex;align-items:center;justify-content:center;border-radius:16px 16px 0 0}
.modal-no-foto i{font-size:56px;color:var(--txt3)}
.modal-gallery{display:flex;gap:8px;padding:0 20px;margin-top:10px;overflow-x:auto;scrollbar-width:none}
.modal-gallery::-webkit-scrollbar{display:none}
.modal-thumb{width:56px;height:56px;border-radius:10px;object-fit:cover;cursor:pointer;border:2px solid transparent;transition:var(--trans);flex-shrink:0}
.modal-thumb.active{border-color:var(--pri)}
.modal-body{padding:20px}
.modal-cat{font-size:11px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.modal-nome{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:var(--txt);margin-bottom:10px;line-height:1.2}
.modal-preco{font-family:'Syne',sans-serif;font-weight:800;font-size:28px;color:var(--pri);margin-bottom:4px}
.modal-sob-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(245,158,11,.1);color:#d97706;border:1px solid rgba(245,158,11,.2);border-radius:99px;padding:5px 12px;font-size:12px;font-weight:600;margin-bottom:10px}
.modal-desc{font-size:14px;line-height:1.65;color:var(--txt2);margin-bottom:16px;white-space:pre-wrap}
.modal-wpp{display:flex;align-items:center;justify-content:center;gap:8px;background:#25D366;color:#fff;border:none;border-radius:99px;padding:14px 24px;font-size:15px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;width:100%;text-decoration:none;transition:var(--trans)}
.modal-wpp:hover{background:#1fb855;transform:translateY(-1px);box-shadow:0 4px 16px rgba(37,211,102,.3)}
.modal-wpp i{font-size:20px}

/* ── FAB ── */
#fab{position:fixed;bottom:24px;right:24px;width:54px;height:54px;background:#25D366;color:#fff;border-radius:50%;display:none;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(37,211,102,.4);text-decoration:none;transition:var(--trans);z-index:150}
#fab:hover{background:#1fb855;transform:scale(1.08)}
#fab i{font-size:26px}

/* ── FOOTER ── */
footer{text-align:center;padding:16px;font-size:11px;color:var(--txt3);border-top:1px solid var(--border);background:var(--surface)}
footer a{color:var(--pri);text-decoration:none;font-weight:600}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  header{padding:0 14px}
  .header-nome{font-size:14px}
  .h-btn span{display:none}
  .h-btn{padding:8px}
  .hero{padding:36px 16px 44px}
  .sticky-filter{padding:10px 14px}
  .content{padding:20px 14px 80px}
  .grid-destaques{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}
  .grid-main{grid-template-columns:repeat(2,1fr)}
  .modal-body{padding:14px}
  .modal-nome{font-size:18px}
  .modal-preco{font-size:22px}
}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div class="spin"></div>
  <p>Carregando catálogo...</p>
</div>

<!-- ERRO -->
<div id="error-page">
  <i id="err-icon" class="ti ti-alert-triangle"></i>
  <h2>Ops!</h2>
  <p id="err-msg">Não foi possível carregar o catálogo.</p>
</div>

<!-- APP (oculto até carregar) -->
<div id="app" style="display:none">

  <!-- HEADER -->
  <header id="app-header">
    <div class="header-inner">
      <div class="logo-circle" id="hdr-logo"></div>
      <div class="header-info">
        <div class="header-nome" id="hdr-nome"></div>
        <div class="header-desc" id="hdr-desc"></div>
      </div>
      <div class="header-actions">
        <a id="hdr-wpp" class="h-btn h-btn-wpp" href="#" target="_blank" rel="noopener" style="display:none">
          <i class="ti ti-brand-whatsapp"></i><span>WhatsApp</span>
        </a>
        <a id="hdr-insta" class="h-btn h-btn-insta" href="#" target="_blank" rel="noopener" style="display:none">
          <i class="ti ti-brand-instagram"></i><span>Instagram</span>
        </a>
      </div>
    </div>
  </header>

  <!-- FILTROS -->
  <div class="sticky-filter">
    <div class="filter-inner">
      <div class="search-wrap">
        <i class="ti ti-search"></i>
        <input id="busca" type="search" placeholder="Buscar produto...">
      </div>
      <div class="cats-row" id="cats-row"></div>
    </div>
  </div>

  <!-- CONTEÚDO -->
  <div class="content">
    <div id="grid-destaques-wrap" style="display:none">
      <div class="sec-label"><span><i class="ti ti-star-filled" style="font-size:11px"></i> Em Destaque</span></div>
      <div class="grid-destaques" id="grid-destaques"></div>
    </div>
    <div id="grid-main-wrap" style="display:none">
      <div id="sec-label-main" class="sec-label" style="display:none">Todos os Produtos</div>
      <div class="grid-main" id="grid-main"></div>
    </div>
    <div id="empty-state" class="empty" style="display:none">
      <i class="ti ti-search-off"></i>
      <h3>Nenhum produto encontrado</h3>
      <p>Tente outro termo ou categoria.</p>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="closeModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
    <div id="modal-img-area"></div>
    <div id="modal-gallery" class="modal-gallery"></div>
    <div class="modal-body">
      <div class="modal-cat" id="modal-cat"></div>
      <div class="modal-nome" id="modal-nome"></div>
      <div id="modal-preco-wrap" style="display:none"><div class="modal-preco" id="modal-preco"></div></div>
      <div id="modal-enc" class="modal-sob-badge" style="display:none"><i class="ti ti-clock" style="font-size:14px"></i> Sob encomenda</div>
      <p class="modal-desc" id="modal-desc" style="display:none"></p>
      <a id="modal-wpp-btn" class="modal-wpp" href="#" target="_blank" rel="noopener" style="display:none">
        <i class="ti ti-brand-whatsapp"></i>
        <span id="modal-wpp-label">Solicitar no WhatsApp</span>
      </a>
    </div>
  </div>
</div>

<!-- FAB WhatsApp -->
<a id="fab" href="#" target="_blank" rel="noopener"><i class="ti ti-brand-whatsapp"></i></a>

<footer>
  Catálogo por <a href="https://misu-store.vercel.app" target="_blank">MISU TECNOLOGY</a>
</footer>

<script>
const SB_URL = 'https://icgfpfwcnhkjglrmnuca.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImljZ2ZwZndjbmhramdscm1udWNhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwODA2OTEsImV4cCI6MjA5NTY1NjY5MX0.xDGiGCIlqXaqdWhWo0NoNi_XUdlw5raCogO_Jnc0ezw';

let STATE = { loja: null, produtos: [], cat: '', busca: '', fotoIdx: 0, modalProd: null };
let db = null;

// ── UTILS ──
const fmt = v => 'R$ ' + (Number(v)||0).toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.');
const waNum = () => { const t = (STATE.loja?.whatsapp||'').replace(/\D/g,''); return t ? (t.length<=11 ? '55'+t : t) : ''; };
const msgProd = p => {
  const pr = p.preco != null ? ' ('+fmt(p.preco)+')' : '';
  const n = STATE.loja?.nome || '';
  return p.disponivel===false
    ? `Olá, ${n}! Gostaria de fazer um pedido sob encomenda do produto: ${p.nome}${pr}. Vocês conseguem providenciar?`
    : `Olá, ${n}! Tenho interesse no produto: ${p.nome}${pr}. Ainda está disponível?`;
};
const waLink = msg => `https://wa.me/${waNum()}?text=${encodeURIComponent(msg)}`;

// ── INIT ──
async function init() {
  const params = new URLSearchParams(location.search);
  const slug = (params.get('loja') || params.get('slug') || '').trim().toLowerCase();

  if (!slug) { showError('ti-link-off', 'Link inválido. Use o endereço com ?loja=nome-da-loja.'); return; }

  try {
    db = supabase.createClient(SB_URL, SB_KEY);
    const { data, error } = await db.from('catalogo_publico').select('*').eq('loja_slug', slug);
    if (error) throw error;
    if (!data || !data.length) { showError('ti-shopping-bag-x', 'Catálogo não encontrado ou indisponível.'); return; }

    const loja = {
      nome: data[0].loja_nome || 'Loja',
      descricao: data[0].loja_descricao || '',
      whatsapp: (data[0].loja_whatsapp || '').replace(/\D/g,''),
      instagram: data[0].loja_instagram || '',
      cor: data[0].loja_cor || '#5B47E0',
      mostrarPreco: data[0].mostrar_preco !== false
    };
    STATE.loja = loja;
    STATE.produtos = data;

    applyTheme(loja.cor);
    renderHeader();
    renderCats();
    renderGrid();

    document.getElementById('busca').addEventListener('input', e => {
      STATE.busca = e.target.value.toLowerCase();
      renderGrid();
    });

    document.title = loja.nome + ' — Catálogo';
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = '';
  } catch(e) {
    showError('ti-alert-triangle', 'Não foi possível carregar o catálogo. Tente novamente.');
    console.error(e);
  }
}

// ── THEME ──
function applyTheme(cor) {
  const r = document.documentElement.style;
  r.setProperty('--pri', cor);
  // darken by 18
  try {
    let n = parseInt(cor.slice(1),16);
    let rv=Math.max(0,(n>>16)-18), gv=Math.max(0,((n>>8)&255)-18), bv=Math.max(0,(n&255)-18);
    r.setProperty('--pri2','#'+((rv<<16)|(gv<<8)|bv).toString(16).padStart(6,'0'));
  } catch(e){}
}

// ── HEADER ──
function renderHeader() {
  const l = STATE.loja;
  document.getElementById('hdr-logo').textContent = (l.nome||'').slice(0,2).toUpperCase();
  document.getElementById('hdr-nome').textContent = l.nome;
  document.getElementById('hdr-desc').textContent = l.descricao || 'Catálogo de produtos';

  const num = waNum();
  if (num) {
    const wEl = document.getElementById('hdr-wpp');
    wEl.href = waLink('Olá! Vi o catálogo de '+l.nome+' e gostaria de mais informações.');
    wEl.style.display = '';
    const fab = document.getElementById('fab');
    fab.href = wEl.href;
    fab.style.display = 'flex';
  }

  const instaHref = l.instagram
    ? (l.instagram.startsWith('http') ? l.instagram : 'https://instagram.com/'+l.instagram.replace('@',''))
    : '';
  if (instaHref) {
    const iEl = document.getElementById('hdr-insta');
    iEl.href = instaHref;
    iEl.style.display = '';
  }
}

// ── CATEGORIAS ──
function renderCats() {
  const cats = [...new Set(STATE.produtos.map(p=>p.categoria).filter(Boolean))].sort();
  const row = document.getElementById('cats-row');
  row.innerHTML = '';
  const mkBtn = (label, val) => {
    const b = document.createElement('button');
    b.className = 'cat-btn' + (STATE.cat === val ? ' active' : '');
    b.textContent = label;
    b.onclick = () => { STATE.cat = val; renderCats(); renderGrid(); };
    return b;
  };
  row.appendChild(mkBtn('Todos', ''));
  cats.forEach(c => row.appendChild(mkBtn(c, c)));
}

// ── GRID ──
function renderGrid() {
  let list = STATE.produtos.slice();
  if (STATE.cat) list = list.filter(p => p.categoria === STATE.cat);
  if (STATE.busca) list = list.filter(p =>
    (p.nome+' '+(p.categoria||'')+' '+(p.marca||'')).toLowerCase().includes(STATE.busca)
  );

  const hasFilters = STATE.cat || STATE.busca;
  const destaques = list.filter(p => p.destaque);
  const normais   = list.filter(p => !p.destaque);

  const showSecs = !hasFilters && destaques.length > 0;

  const dWrap = document.getElementById('grid-destaques-wrap');
  const mWrap = document.getElementById('grid-main-wrap');
  const mHdr  = document.getElementById('sec-label-main');
  const empty  = document.getElementById('empty-state');

  if (list.length === 0) {
    dWrap.style.display = mWrap.style.display = 'none';
    empty.style.display = 'flex';
    return;
  }
  empty.style.display = 'none';

  if (showSecs) {
    dWrap.style.display = '';
    document.getElementById('grid-destaques').innerHTML = destaques.map(p => cardHTML(p, true)).join('');
    mWrap.style.display = normais.length ? '' : 'none';
    mHdr.style.display = normais.length ? '' : 'none';
    document.getElementById('grid-main').innerHTML = normais.map(p => cardHTML(p, false)).join('');
  } else {
    dWrap.style.display = 'none';
    mWrap.style.display = '';
    mHdr.style.display = 'none';
    document.getElementById('grid-main').innerHTML = list.map(p => cardHTML(p, !hasFilters && !!p.destaque)).join('');
  }

  // bind clicks
  document.querySelectorAll('.card[data-idx]').forEach(el => {
    el.onclick = () => openModal(parseInt(el.dataset.idx));
  });
}

function cardHTML(p, hot) {
  const fotos = p.fotos?.length ? p.fotos : [];
  const enc = p.disponivel === false;
  const mostrarPreco = STATE.loja?.mostrarPreco !== false;
  const idx = STATE.produtos.indexOf(p);

  return `<div class="card${hot?' card-hot':''}" data-idx="${idx}">
    ${hot ? '<div class="badge-hot">★ Destaque</div>' : ''}
    ${enc ? '<div class="badge-enc">Encomenda</div>' : ''}
    ${fotos.length
      ? `<img class="card-img" src="${fotos[0]}" alt="${p.nome}" loading="lazy">`
      : `<div class="card-no-img"><i class="ti ti-device-mobile"></i></div>`}
    <div class="card-body">
      <div class="card-cat">${p.categoria||'Produto'}</div>
      <div class="card-nome">${p.nome}</div>
      ${mostrarPreco && p.preco != null ? `<div class="card-preco">${fmt(p.preco)}</div>` : ''}
      ${enc ? '<div class="card-sob">Sob encomenda</div>' : ''}
    </div>
  </div>`;
}

// ── MODAL ──
function openModal(idx) {
  const p = STATE.produtos[idx];
  if (!p) return;
  STATE.modalProd = idx;
  STATE.fotoIdx = 0;
  renderModal();
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function renderModal() {
  const p = STATE.produtos[STATE.modalProd];
  if (!p) return;
  const fotos = p.fotos?.length ? p.fotos : [];
  const enc = p.disponivel === false;
  const num = waNum();
  const mostrarPreco = STATE.loja?.mostrarPreco !== false;
  const fi = Math.min(STATE.fotoIdx, Math.max(0, fotos.length-1));

  // foto principal
  const imgArea = document.getElementById('modal-img-area');
  imgArea.innerHTML = fotos.length
    ? `<img class="modal-foto-main" src="${fotos[fi]}" alt="${p.nome}">`
    : `<div class="modal-no-foto"><i class="ti ti-device-mobile"></i></div>`;

  // galeria
  const gal = document.getElementById('modal-gallery');
  gal.innerHTML = fotos.length > 1
    ? fotos.map((f,i) => `<img class="modal-thumb${i===fi?' active':''}" src="${f}" onclick="setFoto(${i})">`).join('')
    : '';

  document.getElementById('modal-cat').textContent = (p.categoria||'Produto') + (p.marca ? ' · '+p.marca : '');
  document.getElementById('modal-nome').textContent = p.nome;

  const precoWrap = document.getElementById('modal-preco-wrap');
  if (mostrarPreco && p.preco != null) {
    document.getElementById('modal-preco').textContent = fmt(p.preco);
    precoWrap.style.display = '';
  } else { precoWrap.style.display = 'none'; }

  document.getElementById('modal-enc').style.display = enc ? '' : 'none';

  const desc = document.getElementById('modal-desc');
  if (p.descricao) { desc.textContent = p.descricao; desc.style.display = ''; }
  else desc.style.display = 'none';

  const wppBtn = document.getElementById('modal-wpp-btn');
  if (num) {
    wppBtn.href = waLink(msgProd(p));
    document.getElementById('modal-wpp-label').textContent = enc ? 'Solicitar pedido no WhatsApp' : 'Solicitar no WhatsApp';
    wppBtn.style.display = '';
  } else wppBtn.style.display = 'none';
}

function setFoto(i) {
  STATE.fotoIdx = i;
  renderModal();
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
  STATE.modalProd = null;
}

// ── ERROR ──
function showError(icon, msg) {
  document.getElementById('loading').style.display = 'none';
  const ep = document.getElementById('error-page');
  ep.style.display = 'flex';
  document.getElementById('err-icon').className = 'ti '+icon;
  document.getElementById('err-msg').textContent = msg;
}

// ── KEYBOARD ──
document.addEventListener('keydown', e => { if (e.key==='Escape') closeModal(); });

// ── START ──
init();
</script>
</body>
</html>
