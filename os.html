<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acompanhe sua Ordem de Serviço</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="icon" type="image/png" href="/icon-192.png">
<style>
:root{--pri:#1E5EFF;--pri2:#3D8BFF;--bg:#070B1A;--card:#0E1730;--card2:#13204A;--txt:#EAF0FF;--txt2:#A8BAE8;--txt3:#6B7FB8;--border:#1B2A55;--success:#10B981;--warn:#F59E0B;--danger:#EF4444}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;background-image:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(30,94,255,.18),transparent)}
.wrap{max-width:560px;margin:0 auto;padding:28px 18px 60px}
.header{text-align:center;margin-bottom:26px}
.header img{width:74px;height:74px;object-fit:contain;filter:drop-shadow(0 4px 18px rgba(30,94,255,.5))}
.emp-nome{font-family:'Syne',sans-serif;font-weight:800;font-size:19px;margin-top:10px;letter-spacing:.5px}
.emp-sub{font-size:12px;color:var(--txt3);margin-top:2px}
.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:20px;margin-bottom:14px;box-shadow:0 8px 32px rgba(0,0,0,.35)}
.os-num{font-family:'Syne',sans-serif;font-weight:800;font-size:24px;color:var(--pri2)}
.status-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:99px;font-size:13px;font-weight:700;margin-top:8px}
.aparelho{font-size:15px;font-weight:600;margin-top:14px}
.defeito{font-size:13px;color:var(--txt2);margin-top:4px;line-height:1.5}
.prog-bar{height:10px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden;margin-top:16px;border:1px solid var(--border)}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--pri),var(--pri2));border-radius:99px;transition:width 1s ease;box-shadow:0 0 12px rgba(30,94,255,.6)}
.prog-txt{font-size:11px;color:var(--txt3);margin-top:5px;text-align:right}
.sec-lbl{font-size:10.5px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.tl-item{display:flex;gap:14px;position:relative;padding-bottom:20px}
.tl-item:last-child{padding-bottom:0}
.tl-item::before{content:'';position:absolute;left:9px;top:22px;bottom:0;width:2px;background:var(--border)}
.tl-item:last-child::before{display:none}
.tl-dot{width:20px;height:20px;border-radius:50%;background:var(--card2);border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;z-index:1}
.tl-item.done .tl-dot{background:var(--pri);border-color:var(--pri);box-shadow:0 0 10px rgba(30,94,255,.5)}
.tl-item.done .tl-dot::after{content:'✓';font-size:10px;color:#fff;font-weight:800}
.tl-status{font-size:14px;font-weight:600}
.tl-data{font-size:11.5px;color:var(--txt3);margin-top:1px}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:13.5px}
.info-row:last-child{border-bottom:none}
.info-row b{font-size:15px}
.btn-wpp{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;border-radius:14px;background:#25D366;color:#fff;font-weight:700;font-size:14.5px;text-decoration:none;font-family:'DM Sans',sans-serif;border:none;cursor:pointer;margin-top:6px;box-shadow:0 6px 20px rgba(37,211,102,.3)}
.center{text-align:center;padding:60px 20px}
.center i{font-size:48px;color:var(--txt3);opacity:.5}
.center p{color:var(--txt2);margin-top:14px;font-size:14px}
.atualizado{text-align:center;font-size:11px;color:var(--txt3);margin-top:16px}
.footer{text-align:center;margin-top:26px;font-size:11px;color:var(--txt3)}
.footer b{color:var(--pri2)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.loading i{animation:pulse 1.2s infinite;font-size:40px;color:var(--pri)}
.midia-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
.midia-item{aspect-ratio:1;border-radius:10px;overflow:hidden;background:#000;cursor:pointer;position:relative;border:1px solid var(--border)}
.midia-item img,.midia-item video{width:100%;height:100%;object-fit:cover}
.midia-play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:26px;text-shadow:0 2px 8px rgba(0,0,0,.6)}
.aut-card{border:1.5px solid var(--warn);border-radius:14px;padding:16px;margin-bottom:12px;background:rgba(245,158,11,.06)}
.aut-card.resp{border-color:var(--border);background:var(--card)}
.sign-pad{width:100%;height:160px;background:#fff;border-radius:12px;border:2px dashed var(--border);touch-action:none;cursor:crosshair;margin-top:10px}
.btn-aceitar{flex:1;padding:14px;border:none;border-radius:12px;background:var(--success);color:#fff;font-weight:700;font-size:14.5px;cursor:pointer}
.btn-recusar{flex:1;padding:14px;border:1.5px solid var(--danger);border-radius:12px;background:transparent;color:var(--danger);font-weight:700;font-size:14.5px;cursor:pointer}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;display:none;align-items:center;justify-content:center;padding:20px}
.lightbox.open{display:flex}
.lightbox img,.lightbox video{max-width:100%;max-height:90vh;border-radius:10px}
.lightbox-close{position:absolute;top:16px;right:20px;color:#fff;font-size:32px;cursor:pointer}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <img src="/icon-192.png" alt="">
    <div class="emp-nome" id="emp-nome">Carregando…</div>
    <div class="emp-sub" id="emp-sub"></div>
  </div>
  <div id="conteudo">
    <div class="center loading"><i class="ti ti-loader-2"></i><p>Buscando sua ordem de serviço…</p></div>
  </div>
  <div class="footer">Acompanhamento em tempo real · Sistema <b>MISU SYS</b></div>
</div>
<div class="lightbox" id="lightbox" onclick="fecharLightbox(event)">
  <span class="lightbox-close" onclick="fecharLightbox()">&times;</span>
  <div id="lightbox-content"></div>
</div>

<script>
const SURL = 'https://icgfpfwcnhkjglrmnuca.supabase.co';
const SKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImljZ2ZwZndjbmhramdscm1udWNhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwODA2OTEsImV4cCI6MjA5NTY1NjY5MX0.xDGiGCIlqXaqdWhWo0NoNi_XUdlw5raCogO_Jnc0ezw';
const db = supabase.createClient(SURL, SKEY);

const token = new URLSearchParams(location.search).get('t') || '';
const esc = s => String(s??'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmt = v => 'R$ ' + (parseFloat(v)||0).toLocaleString('pt-BR',{minimumFractionDigits:2});
const fmtDT = d => d ? new Date(d).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';
const fmtD = d => d ? new Date(d+(d.length===10?'T12:00':'')).toLocaleDateString('pt-BR') : null;

const STATUS_INFO = {
  'Aguardando':      { cor:'#F59E0B', bg:'rgba(245,158,11,.14)', icone:'ti-clock',        msg:'Recebemos seu aparelho e ele está na fila de análise.' },
  'Em Análise':      { cor:'#3D8BFF', bg:'rgba(61,139,255,.14)', icone:'ti-search',       msg:'Nosso técnico está diagnosticando o problema.' },
  'Em Reparo':       { cor:'#8B5CF6', bg:'rgba(139,92,246,.14)', icone:'ti-tool',         msg:'Seu aparelho está sendo reparado agora.' },
  'Aguardando Peça': { cor:'#EF4444', bg:'rgba(239,68,68,.14)',  icone:'ti-package',      msg:'Aguardando a chegada de uma peça necessária.' },
  'Pronto':          { cor:'#10B981', bg:'rgba(16,185,129,.14)', icone:'ti-circle-check', msg:'Reparo concluído! Estamos preparando a entrega.' },
  'Ag. Pagamento':   { cor:'#F59E0B', bg:'rgba(245,158,11,.14)', icone:'ti-cash',         msg:'Pronto! Retire seu aparelho e finalize o pagamento no balcão.' },
  'Entregue':        { cor:'#10B981', bg:'rgba(16,185,129,.14)', icone:'ti-check',        msg:'Aparelho entregue. Obrigado pela confiança!' },
  'Cancelada':       { cor:'#6B7280', bg:'rgba(107,114,128,.14)',icone:'ti-ban',          msg:'Esta ordem de serviço foi cancelada.' }
};

async function carregar(primeira){
  if(!token || token.length < 32){
    document.getElementById('conteudo').innerHTML =
      '<div class="center"><i class="ti ti-link-off"></i><p>Link inválido ou incompleto.<br>Solicite o link de acompanhamento à loja.</p></div>';
    return;
  }
  try{
    const { data, error } = await db.rpc('os_publica', { tok: token });
    if(error) throw error;
    if(!data){ 
      document.getElementById('conteudo').innerHTML =
        '<div class="center"><i class="ti ti-file-off"></i><p>Ordem de serviço não encontrada.<br>Verifique o link com a loja.</p></div>';
      return;
    }
    render(data);
  }catch(e){
    if(primeira) document.getElementById('conteudo').innerHTML =
      `<div class="center"><i class="ti ti-wifi-off"></i><p>Não foi possível carregar agora.<br>Tente novamente em instantes.</p></div>`;
  }
}

let _osData = null;
let _sigCtx = null, _sigDraw = false, _sigHasInk = false, _sigAutId = null;

function render(o){
  _osData = o;
  const emp = o.empresa || {};
  document.getElementById('emp-nome').textContent = emp.nome || 'Assistência Técnica';
  document.getElementById('emp-sub').textContent = emp.cidade || '';
  document.title = `OS ${o.numero} — ${emp.nome||''}`;

  const st = STATUS_INFO[o.status] || STATUS_INFO['Aguardando'];
  const tel = String(emp.whatsapp || emp.telefone || '').replace(/\D/g,'');
  const prazo = fmtD(o.prazo_entrega);

  // Timeline: mais recente por último (ordem cronológica)
  const tl = (o.timeline||[]).slice(-8);

  document.getElementById('conteudo').innerHTML = `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px">
        <div>
          <div class="os-num">OS ${esc(o.numero)}</div>
          <div style="font-size:12px;color:var(--txt3)">Aberta em ${fmtDT(o.criado_em)}</div>
        </div>
        <span class="status-pill" style="color:${st.cor};background:${st.bg};border:1.5px solid ${st.cor}44">
          <i class="ti ${st.icone}"></i> ${esc(o.status)}
        </span>
      </div>
      <div class="aparelho"><i class="ti ti-device-mobile" style="color:var(--pri2)"></i> ${esc(o.aparelho||'')}</div>
      ${o.defeito?`<div class="defeito">${esc(o.defeito)}</div>`:''}
      <div style="margin-top:12px;padding:12px 14px;background:${st.bg};border-radius:11px;font-size:13px;color:${st.cor};font-weight:600">
        ${st.msg}
      </div>
      <div class="prog-bar"><div class="prog-fill" style="width:${o.progresso||0}%"></div></div>
      <div class="prog-txt">${o.progresso||0}% concluído</div>
    </div>

    <div class="card">
      <div class="sec-lbl"><i class="ti ti-timeline"></i> Histórico</div>
      ${tl.length? tl.map((t,i)=>`
        <div class="tl-item ${i<tl.length?'done':''}">
          <div class="tl-dot"></div>
          <div><div class="tl-status">${esc(t.status||'')}</div><div class="tl-data">${fmtDT(t.data)}</div></div>
        </div>`).join('') : '<div style="color:var(--txt3);font-size:13px">Sem movimentações ainda.</div>'}
    </div>

    <div class="card">
      <div class="sec-lbl"><i class="ti ti-file-invoice"></i> Detalhes</div>
      ${o.diagnostico?`<div class="info-row"><span style="color:var(--txt2)">Diagnóstico</span><span style="max-width:60%;text-align:right;font-size:12.5px">${esc(o.diagnostico)}</span></div>`:''}
      ${prazo?`<div class="info-row"><span style="color:var(--txt2)">Previsão de entrega</span><b>${prazo}</b></div>`:''}
      <div class="info-row"><span style="color:var(--txt2)">Valor do serviço</span><b style="color:var(--pri2)">${fmt(o.total)}</b></div>
      ${o.garantia_dias?`<div class="info-row"><span style="color:var(--txt2)">Garantia</span><b style="color:var(--success)"><i class="ti ti-shield"></i> ${o.garantia_dias} dias</b></div>`:''}
    </div>

    ${(o.midias&&o.midias.length)?`
    <div class="card">
      <div class="sec-lbl"><i class="ti ti-photo"></i> Fotos e vídeos do seu aparelho</div>
      <div class="midia-grid">
        ${o.midias.map((m,i)=>`<div class="midia-item" onclick="abrirLightbox(${i})">
          ${m.tipo==='video'?`<video src="${m.url}" muted></video><span class="midia-play"><i class="ti ti-player-play-filled"></i></span>`:`<img src="${m.url}" loading="lazy">`}
        </div>`).join('')}
      </div>
    </div>`:''}

    ${(o.autorizacoes&&o.autorizacoes.length)?`
    <div class="card">
      <div class="sec-lbl"><i class="ti ti-signature"></i> Autorizações</div>
      ${o.autorizacoes.map(a=>renderAutorizacao(a)).join('')}
    </div>`:''}

    ${tel?`<a class="btn-wpp" href="https://api.whatsapp.com/send?phone=55${tel}&text=${encodeURIComponent('Olá! Estou acompanhando a OS '+o.numero+' e gostaria de mais informações.')}" target="_blank">
      <i class="ti ti-brand-whatsapp" style="font-size:19px"></i> Falar com a loja
    </a>`:''}
    <div class="atualizado"><i class="ti ti-refresh"></i> Atualiza automaticamente · último: ${new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}</div>
  `;
}

function renderAutorizacao(a){
  if(a.status==='pendente'){
    return `<div class="aut-card" id="aut-${a.id}">
      <div style="font-weight:700;font-size:14.5px;margin-bottom:5px">${esc(a.titulo)}</div>
      <div style="font-size:13px;color:var(--txt2);line-height:1.5;margin-bottom:8px">${esc(a.descricao)}</div>
      ${a.valor?`<div style="font-size:16px;font-weight:800;color:var(--pri2);margin-bottom:10px">${fmt(a.valor)}</div>`:''}
      <div style="font-size:12px;color:var(--warn);font-weight:600;margin-bottom:4px"><i class="ti ti-info-circle"></i> Assine abaixo para confirmar sua decisão:</div>
      <canvas class="sign-pad" id="sign-${a.id}"></canvas>
      <div style="display:flex;justify-content:space-between;margin-top:4px">
        <button onclick="limparAssinatura('${a.id}')" style="background:none;border:none;color:var(--txt3);font-size:12px;cursor:pointer"><i class="ti ti-eraser"></i> Limpar</button>
      </div>
      <textarea id="obs-${a.id}" placeholder="Observação (opcional)" style="width:100%;margin-top:8px;padding:9px 11px;border-radius:9px;border:1px solid var(--border);background:var(--card);color:var(--txt);font-family:inherit;font-size:13px;resize:vertical" rows="2"></textarea>
      <div style="display:flex;gap:10px;margin-top:10px">
        <button class="btn-recusar" onclick="responderAut('${a.id}',false)">Recusar</button>
        <button class="btn-aceitar" onclick="responderAut('${a.id}',true)">✓ Autorizar</button>
      </div>
    </div>`;
  }
  const cor=a.status==='aceita'?'var(--success)':'var(--danger)';
  const ico=a.status==='aceita'?'ti-circle-check':'ti-circle-x';
  const txt=a.status==='aceita'?'Você autorizou':'Você recusou';
  return `<div class="aut-card resp">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
      <div style="font-weight:700;font-size:14px">${esc(a.titulo)}</div>
      <span style="color:${cor};font-weight:700;font-size:12.5px;white-space:nowrap"><i class="ti ${ico}"></i> ${txt}</span>
    </div>
    <div style="font-size:12.5px;color:var(--txt3);margin-top:4px">${esc(a.descricao)}</div>
    ${a.resp_em?`<div style="font-size:11px;color:var(--txt3);margin-top:6px"><i class="ti ti-clock"></i> Respondido em ${fmtDT(a.resp_em)}</div>`:''}
  </div>`;
}

// Inicializa os canvas de assinatura após o render
function initSignPads(){
  (_osData?.autorizacoes||[]).filter(a=>a.status==='pendente').forEach(a=>{
    const cv=document.getElementById('sign-'+a.id);
    if(!cv)return;
    const rect=cv.getBoundingClientRect();
    cv.width=rect.width*2; cv.height=rect.height*2;
    const ctx=cv.getContext('2d');
    ctx.scale(2,2); ctx.strokeStyle='#111'; ctx.lineWidth=2.2; ctx.lineCap='round'; ctx.lineJoin='round';
    let drawing=false,hasInk=false;
    const pos=e=>{const r=cv.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top};};
    const start=e=>{e.preventDefault();drawing=true;const p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);};
    const move=e=>{if(!drawing)return;e.preventDefault();const p=pos(e);ctx.lineTo(p.x,p.y);ctx.stroke();hasInk=true;cv.dataset.ink='1';};
    const end=()=>{drawing=false;};
    cv.addEventListener('mousedown',start);cv.addEventListener('mousemove',move);cv.addEventListener('mouseup',end);cv.addEventListener('mouseleave',end);
    cv.addEventListener('touchstart',start,{passive:false});cv.addEventListener('touchmove',move,{passive:false});cv.addEventListener('touchend',end);
  });
}

function limparAssinatura(id){
  const cv=document.getElementById('sign-'+id);
  if(cv){const ctx=cv.getContext('2d');ctx.clearRect(0,0,cv.width,cv.height);cv.dataset.ink='';}
}

async function responderAut(id, aceitar){
  const cv=document.getElementById('sign-'+id);
  if(aceitar && (!cv||cv.dataset.ink!=='1')){
    alert('Por favor, assine no quadro antes de autorizar.');
    return;
  }
  const assinatura = cv ? cv.toDataURL('image/png') : null;
  const obs = document.getElementById('obs-'+id)?.value || null;
  const card = document.getElementById('aut-'+id);
  if(card) card.innerHTML='<div style="text-align:center;padding:20px;color:var(--txt3)"><i class="ti ti-loader-2" style="animation:pulse 1s infinite;font-size:26px"></i><br>Registrando…</div>';
  try{
    const { data, error } = await db.rpc('os_responder_autorizacao', {
      tok: token, autoriz_id: id, aceitar,
      assinatura_data: aceitar ? assinatura : null,
      obs, ip: '', dispositivo: navigator.userAgent.slice(0,180)
    });
    if(error) throw error;
    if(data && data.ok){ carregar(false); }
    else { alert(data?.erro||'Não foi possível registrar.'); carregar(false); }
  }catch(e){ alert('Erro ao registrar. Tente novamente.'); carregar(false); }
}

// Lightbox de mídias
function abrirLightbox(i){
  const m=(_osData?.midias||[])[i]; if(!m)return;
  const lb=document.getElementById('lightbox');
  const c=document.getElementById('lightbox-content');
  c.innerHTML = m.tipo==='video'
    ? `<video src="${m.url}" controls autoplay style="max-width:100%;max-height:90vh"></video>`
    : `<img src="${m.url}">`;
  lb.classList.add('open');
}
function fecharLightbox(e){
  if(e && e.target.tagName==='VIDEO') return;
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-content').innerHTML='';
}

// Web Push (opcional) — pede permissão e registra a inscrição
async function pedirPush(){
  if(!('serviceWorker' in navigator) || !('PushManager' in window)) return;
  try{
    const perm = await Notification.requestPermission();
    if(perm!=='granted') return;
    const reg = await navigator.serviceWorker.register('/sw.js');
    // A chave VAPID pública deve ser configurada no deploy; sem ela, só registra permissão.
    // Inscrição básica sem VAPID falha em alguns navegadores — envolvemos em try.
    try{
      const sub = await reg.pushManager.subscribe({ userVisibleOnly: true });
      await db.rpc('os_registrar_push', { tok: token, sub: sub.toJSON() });
    }catch(_){}
  }catch(e){}
}

// Após cada render, inicializa assinaturas e oferece push uma vez
const _origRender = render;
render = function(o){ _origRender(o); setTimeout(initSignPads, 60); };

carregar(true);
setInterval(()=>carregar(false), 20000); // atualização automática a cada 20s
// Oferece notificação por push na primeira visita (não bloqueia)
if(!localStorage.getItem('misu_push_asked')){
  setTimeout(()=>{ localStorage.setItem('misu_push_asked','1'); pedirPush(); }, 8000);
}
</script>
</body>
</html>
